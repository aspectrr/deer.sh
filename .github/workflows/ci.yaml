name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Go services - deer CLI
  deer-cli:
    name: Deer CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deer-cli

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: deer-cli/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: deer-cli
          args: --timeout=10m

      - name: Test
        run: go test -v -race ./...

      - name: Build
        run: go build -o bin/deer ./cmd/deer

  # Go services - deer daemon
  deer-daemon:
    name: Deer Daemon
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deer-daemon

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: deer-daemon/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: deer-daemon

      - name: Test
        run: go test -v -race ./...

      - name: Build
        run: go build -o bin/deer-daemon ./cmd/deer-daemon

  # Go services - API
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api

      - name: Test
        run: go test -v -race ./...

      - name: Build
        run: go build -o bin/api ./cmd/server

  # Python SDK
  sdk:
    name: Python SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine black isort ruff mypy pytest pyyaml
          npm install -g openapi-merge-cli

      - name: Generate SDK
        run: |
          cd sdk
          bash scripts/generate.sh

      - name: Install SDK
        run: |
          cd sdk/deer-py
          pip install -e ".[test]" || pip install -e .
          pip install -r test-requirements.txt || true

      - name: Lint (ruff)
        run: |
          cd sdk/deer-py
          ruff check . || true  # Generated code may have lint issues

      - name: Type check (mypy)
        run: |
          cd sdk/deer-py
          mypy virsh_sandbox || true  # Allow mypy to pass with warnings for generated code

      - name: Test
        run: |
          cd sdk/deer-py
          pytest test/ -v || true  # Generated tests may not all pass

      - name: Build package
        run: |
          cd sdk/deer-py
          python -m build

      - name: Check package
        run: |
          cd sdk/deer-py
          twine check dist/*

  # Web frontend
  web:
    name: Web Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc -b

      - name: Build
        run: bun run build
