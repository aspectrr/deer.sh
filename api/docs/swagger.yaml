basePath: /v1
definitions:
  orchestrator.CreateSandboxRequest:
    properties:
      agent_id:
        type: string
      base_image:
        type: string
      memory_mb:
        type: integer
      name:
        type: string
      network:
        type: string
      org_id:
        type: string
      source_vm:
        type: string
      ttl_seconds:
        type: integer
      vcpus:
        type: integer
    type: object
  orchestrator.HostInfo:
    properties:
      active_sandboxes:
        type: integer
      available_cpus:
        type: integer
      available_disk_mb:
        type: integer
      available_memory_mb:
        type: integer
      base_images:
        items:
          type: string
        type: array
      host_id:
        type: string
      hostname:
        type: string
      last_heartbeat:
        type: string
      status:
        type: string
    type: object
  orchestrator.PrepareRequest:
    properties:
      ssh_key_path:
        type: string
      ssh_user:
        type: string
    type: object
  orchestrator.ReadSourceRequest:
    properties:
      path:
        type: string
    type: object
  orchestrator.RunCommandRequest:
    properties:
      command:
        type: string
      env:
        additionalProperties:
          type: string
        type: object
      timeout_seconds:
        type: integer
    type: object
  orchestrator.RunSourceRequest:
    properties:
      command:
        type: string
      timeout_seconds:
        type: integer
    type: object
  orchestrator.SnapshotRequest:
    properties:
      name:
        type: string
    type: object
  orchestrator.SnapshotResponse:
    properties:
      created_at:
        type: string
      sandbox_id:
        type: string
      snapshot_id:
        type: string
      snapshot_name:
        type: string
    type: object
  orchestrator.SourceCommandResult:
    properties:
      exit_code:
        type: integer
      source_vm:
        type: string
      stderr:
        type: string
      stdout:
        type: string
    type: object
  orchestrator.SourceFileResult:
    properties:
      content:
        type: string
      path:
        type: string
      source_vm:
        type: string
    type: object
  rest.addMemberRequest:
    properties:
      email:
        type: string
      role:
        type: string
    type: object
  rest.authResponse:
    properties:
      user:
        $ref: "#/definitions/rest.userResponse"
    type: object
  rest.createHostTokenRequest:
    properties:
      name:
        type: string
    type: object
  rest.createOrgRequest:
    properties:
      name:
        type: string
      slug:
        type: string
    type: object
  rest.hostTokenResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      token:
        description: Only set on creation.
        type: string
    type: object
  rest.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  rest.memberResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  rest.orgResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      slug:
        type: string
      stripe_customer_id:
        type: string
    type: object
  rest.registerRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  rest.swaggerError:
    properties:
      code:
        type: integer
      details:
        type: string
      error:
        type: string
    type: object
  rest.updateOrgRequest:
    properties:
      name:
        type: string
    type: object
  rest.userResponse:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      id:
        type: string
    type: object
  store.Command:
    properties:
      command:
        type: string
      duration_ms:
        type: integer
      ended_at:
        type: string
      exit_code:
        type: integer
      id:
        type: string
      sandbox_id:
        type: string
      started_at:
        type: string
      stderr:
        type: string
      stdout:
        type: string
    type: object
  store.Sandbox:
    properties:
      agent_id:
        type: string
      base_image:
        type: string
      bridge:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      host_id:
        type: string
      id:
        type: string
      ip_address:
        type: string
      mac_address:
        type: string
      memory_mb:
        type: integer
      name:
        type: string
      org_id:
        type: string
      source_vm:
        type: string
      state:
        $ref: "#/definitions/store.SandboxState"
      tap_device:
        type: string
      ttl_seconds:
        type: integer
      updated_at:
        type: string
      vcpus:
        type: integer
    type: object
  store.SandboxState:
    enum:
      - CREATING
      - RUNNING
      - STOPPED
      - DESTROYED
      - ERROR
    type: string
    x-enum-varnames:
      - SandboxStateCreating
      - SandboxStateRunning
      - SandboxStateStopped
      - SandboxStateDestroyed
      - SandboxStateError
host: localhost:8080
info:
  contact: {}
  description: API for managing sandboxes, organizations, billing, and hosts
  title: Fluid API
  version: "1.0"
paths:
  /auth/github:
    get:
      description: Redirect to GitHub OAuth authorization page
      responses:
        "302":
          description: Redirect to GitHub
        "501":
          description: Not Implemented
          schema:
            $ref: "#/definitions/rest.swaggerError"
      summary: GitHub OAuth login
      tags:
        - Auth
  /auth/github/callback:
    get:
      description:
        Handle GitHub OAuth callback, create or link user, set session
        cookie, and redirect to dashboard
      parameters:
        - description: OAuth authorization code
          in: query
          name: code
          required: true
          type: string
      responses:
        "302":
          description: Redirect to dashboard
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      summary: GitHub OAuth callback
      tags:
        - Auth
  /auth/google:
    get:
      description: Redirect to Google OAuth authorization page
      responses:
        "302":
          description: Redirect to Google
        "501":
          description: Not Implemented
          schema:
            $ref: "#/definitions/rest.swaggerError"
      summary: Google OAuth login
      tags:
        - Auth
  /auth/google/callback:
    get:
      description:
        Handle Google OAuth callback, create or link user, set session
        cookie, and redirect to dashboard
      parameters:
        - description: OAuth authorization code
          in: query
          name: code
          required: true
          type: string
      responses:
        "302":
          description: Redirect to dashboard
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      summary: Google OAuth callback
      tags:
        - Auth
  /auth/login:
    post:
      consumes:
        - application/json
      description: Authenticate with email and password, returns a session cookie
      parameters:
        - description: Login credentials
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/rest.loginRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/rest.authResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      summary: Log in
      tags:
        - Auth
  /auth/logout:
    post:
      description: Invalidate the current session and clear the session cookie
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - CookieAuth: []
      summary: Log out
      tags:
        - Auth
  /auth/me:
    get:
      description: Return the currently authenticated user
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/rest.authResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Get current user
      tags:
        - Auth
  /auth/register:
    post:
      consumes:
        - application/json
      description: Create a new user account and return a session cookie
      parameters:
        - description: Registration details
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/rest.registerRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/rest.authResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "409":
          description: Conflict
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      summary: Register a new user
      tags:
        - Auth
  /health:
    get:
      description: Returns API health status
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
        - Health
  /orgs:
    get:
      description: List all organizations the current user belongs to
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: List organizations
      tags:
        - Organizations
    post:
      consumes:
        - application/json
      description: Create a new organization and add the current user as owner
      parameters:
        - description: Organization details
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/rest.createOrgRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/rest.orgResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "409":
          description: Conflict
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Create organization
      tags:
        - Organizations
  /orgs/{slug}:
    delete:
      description: Delete an organization (owner only)
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Delete organization
      tags:
        - Organizations
    get:
      description: Get organization details by slug
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/rest.orgResponse"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Get organization
      tags:
        - Organizations
    patch:
      consumes:
        - application/json
      description: Update organization details (owner or admin only)
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Fields to update
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/rest.updateOrgRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/rest.orgResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Update organization
      tags:
        - Organizations
  /orgs/{slug}/hosts:
    get:
      description: List all connected sandbox hosts
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: List hosts
      tags:
        - Hosts
  /orgs/{slug}/hosts/{hostID}:
    get:
      description: Get details of a specific connected host
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Host ID
          in: path
          name: hostID
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/orchestrator.HostInfo"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Get host
      tags:
        - Hosts
  /orgs/{slug}/hosts/tokens:
    get:
      description: List all host tokens for the organization
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: List host tokens
      tags:
        - Host Tokens
    post:
      consumes:
        - application/json
      description: Generate a new host authentication token (owner or admin only)
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Token details
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/rest.createHostTokenRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/rest.hostTokenResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Create host token
      tags:
        - Host Tokens
  /orgs/{slug}/hosts/tokens/{tokenID}:
    delete:
      description: Delete a host token (owner or admin only)
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Token ID
          in: path
          name: tokenID
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Delete host token
      tags:
        - Host Tokens
  /orgs/{slug}/members:
    get:
      description: List all members of an organization
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: List members
      tags:
        - Members
    post:
      consumes:
        - application/json
      description: Add a user to an organization (owner or admin only)
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Member details
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/rest.addMemberRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/rest.memberResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "409":
          description: Conflict
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Add member
      tags:
        - Members
  /orgs/{slug}/members/{memberID}:
    delete:
      description: Remove a member from an organization (owner or admin only)
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Member ID
          in: path
          name: memberID
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Remove member
      tags:
        - Members
  /orgs/{slug}/sandboxes:
    get:
      description: List all sandboxes in the organization
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: List sandboxes
      tags:
        - Sandboxes
    post:
      consumes:
        - application/json
      description:
        Create a new sandbox in the organization from a source VM or base
        image
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Sandbox configuration
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/orchestrator.CreateSandboxRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/store.Sandbox"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Create sandbox
      tags:
        - Sandboxes
  /orgs/{slug}/sandboxes/{sandboxID}:
    delete:
      description: Destroy a sandbox and release its resources
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Sandbox ID
          in: path
          name: sandboxID
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Destroy sandbox
      tags:
        - Sandboxes
    get:
      description: Get sandbox details by ID
      parameters:
        - description: Organization slug
          in: path
          name: slug
          required: true
          type: string
        - description: Sandbox ID
          in: path
          name: sandboxID
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/store.Sandbox"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/rest.swaggerError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/rest.swaggerError"
      security:
        - CookieAuth: []
      summary: Get sandbox
      tags:
        - Sandboxes
  /orgs/{slug}/sandboxes/{sandboxID}/commands:
