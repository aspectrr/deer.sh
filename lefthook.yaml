pre-commit:
  parallel: false
  commands:
    # Go - deer CLI
    fmt-deer-cli:
      glob: "*.go"
      root: "deer-cli"
      run: "make fmt"
      stage_fixed: true

    # Go - deer daemon
    fmt-deer-daemon:
      glob: "*.go"
      root: "deer-daemon"
      run: "make fmt"
      stage_fixed: true

    # Go - API
    fmt-api:
      glob: "*.go"
      root: "api"
      run: "make fmt"
      stage_fixed: true

    # Python SDK
    fmt-sdk-black:
      glob: "*.py"
      root: "sdk/deer-py"
      run: black .
      stage_fixed: true

    fmt-sdk-isort:
      glob: "*.py"
      root: "sdk/deer-py"
      run: isort .
      stage_fixed: true

    # Web
    fmt-web:
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      root: "web"
      run: bun format
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    # Go - deer CLI
    vet-deer-cli:
      glob: "*.go"
      root: "deer-cli"
      run: make vet

    test-deer-cli:
      glob: "*.go"
      root: "deer-cli"
      run: make test

    lint-deer-cli:
      glob: "*.go"
      root: "deer-cli"
      run: make lint

    # Go - deer daemon
    vet-deer-daemon:
      glob: "*.go"
      root: "deer-daemon"
      run: make vet

    test-deer-daemon:
      glob: "*.go"
      root: "deer-daemon"
      run: make test

    lint-deer-daemon:
      glob: "*.go"
      root: "deer-daemon"
      run: make lint

    # Go - API
    vet-api:
      glob: "*.go"
      root: "api"
      run: make vet

    test-api:
      glob: "*.go"
      root: "api"
      run: make test

    lint-api:
      glob: "*.go"
      root: "api"
      run: make lint

    # Python SDK
    test-sdk:
      glob: "*.py"
      root: "sdk/deer-py"
      run: python3 -m pytest test/ -v --tb=short

    # Web
    lint-web:
      glob: "*.ts"
      root: "web"
      run: bun lint

    typecheck-web:
      glob: "*.ts"
      root: "web"
      run: bun typecheck
