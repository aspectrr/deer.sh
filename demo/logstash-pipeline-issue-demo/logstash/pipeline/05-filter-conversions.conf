filter {
  if "weather_parsed" in [tags] {
    mutate {
      convert => {
        "latitude"       => "float"
        "longitude"      => "float"
        "temperature"    => "float"
        "feels_like"     => "float"
        "humidity"       => "integer"
        "dew_point"      => "float"
        "wind_speed"     => "float"
        "wind_dir"       => "integer"
        "wind_gusts"     => "float"
        "pressure"       => "float"
        "cloud_cover"    => "integer"
        "visibility"     => "integer"
        "uv_index"       => "float"
        "precipitation"  => "float"
        "weather_code"   => "integer"
        "is_day"         => "integer"
        "soil_temperature" => "float"
      }
    }
  }
}
