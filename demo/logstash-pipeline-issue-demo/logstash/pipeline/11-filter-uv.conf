filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        uv = event.get('uv_index').to_f

        category = case uv
          when 0...3    then 'low'
          when 3...6    then 'moderate'
          when 6...8    then 'high'
          when 8...11   then 'very_high'
          else               'extreme'
        end
        event.set('uv_category', category)

        protection = case uv
          when 0...3  then 'no_protection_needed'
          when 3...6  then 'some_protection'
          when 6...8  then 'protection_essential'
          else             'extra_protection_required'
        end
        event.set('uv_protection_recommendation', protection)
      "
    }
  }
}
