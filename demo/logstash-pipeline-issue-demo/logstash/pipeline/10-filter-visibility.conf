filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        vis_m = event.get('visibility').to_i

        category = case vis_m
          when 0..200      then 'dense_fog'
          when 201..500    then 'thick_fog'
          when 501..1000   then 'fog'
          when 1001..2000  then 'mist'
          when 2001..4000  then 'haze'
          when 4001..10000 then 'moderate'
          when 10001..20000 then 'good'
          else                  'excellent'
        end
        event.set('visibility_category', category)

        # Convert meters to miles
        vis_miles = (vis_m / 1609.34).round(2)
        event.set('visibility_miles', vis_miles)

        # Flag low-visibility conditions
        if vis_m <= 1000
          event.set('low_visibility_alert', true)
        end
      "
    }
  }
}
