filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        dir = event.get('wind_dir').to_i
        compass = case dir
          when   0..11  then 'N'
          when  12..33  then 'NNE'
          when  34..56  then 'NE'
          when  57..78  then 'ENE'
          when  79..101 then 'E'
          when 102..123 then 'ESE'
          when 124..146 then 'SE'
          when 147..168 then 'SSE'
          when 169..191 then 'S'
          when 192..213 then 'SSW'
          when 214..236 then 'SW'
          when 237..258 then 'WSW'
          when 259..281 then 'W'
          when 282..303 then 'WNW'
          when 304..326 then 'NW'
          when 327..348 then 'NNW'
          else               'N'
        end
        event.set('wind_direction_compass', compass)

        # Beaufort scale (from km/h)
        spd = event.get('wind_speed').to_f
        beaufort = case spd
          when 0..1    then 0
          when 1..5    then 1
          when 6..11   then 2
          when 12..19  then 3
          when 20..28  then 4
          when 29..38  then 5
          when 39..49  then 6
          when 50..61  then 7
          when 62..74  then 8
          when 75..88  then 9
          when 89..102 then 10
          when 103..117 then 11
          else              12
        end
        event.set('wind_beaufort', beaufort)

        beaufort_label = case beaufort
          when 0  then 'calm'
          when 1  then 'light_air'
          when 2  then 'light_breeze'
          when 3  then 'gentle_breeze'
          when 4  then 'moderate_breeze'
          when 5  then 'fresh_breeze'
          when 6  then 'strong_breeze'
          when 7  then 'near_gale'
          when 8  then 'gale'
          when 9  then 'strong_gale'
          when 10 then 'storm'
          when 11 then 'violent_storm'
          else        'hurricane'
        end
        event.set('wind_beaufort_label', beaufort_label)

        # Wind chill (valid when temp_c <= 10 and wind_speed >= 4.8 km/h)
        temp_c = event.get('temperature').to_f
        if temp_c <= 10 && spd >= 4.8
          wc = 13.12 + 0.6215 * temp_c - 11.37 * (spd ** 0.16) + 0.3965 * temp_c * (spd ** 0.16)
          event.set('wind_chill_c', wc.round(1))
          event.set('wind_chill_f', (wc * 9.0 / 5.0 + 32.0).round(1))
        end
      "
    }
  }
}
