filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        hpa = event.get('pressure').to_f

        category = case hpa
          when 0..980        then 'very_low'
          when 980..1000     then 'low'
          when 1000..1013    then 'below_normal'
          when 1013..1020    then 'normal'
          when 1020..1035    then 'high'
          else                    'very_high'
        end
        event.set('pressure_category', category)

        # Convert hPa to inHg (inches of mercury)
        inhg = (hpa * 0.02953).round(2)
        event.set('pressure_inhg', inhg)

        # Rough weather tendency from pressure (static snapshot only)
        tendency = case hpa
          when 0..1009    then 'stormy_tendency'
          when 1010..1017 then 'changeable'
          when 1018..1025 then 'fair'
          else                 'settled'
        end
        event.set('pressure_tendency', tendency)
      "
    }
  }
}
