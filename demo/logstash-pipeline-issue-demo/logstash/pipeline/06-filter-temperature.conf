filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        if event.get('temperature')
          c = event.get('temperature').to_f
          event.set('temperature_f', (c * 9.0 / 5.0 + 32.0).round(1))
        end

        if event.get('feels_like')
          fl = event.get('feels_like').to_f
          event.set('feels_like_f', (fl * 9.0 / 5.0 + 32.0).round(1))
        end

        if event.get('soil_temperature')
          st = event.get('soil_temperature').to_f
          event.set('soil_temperature_f', (st * 9.0 / 5.0 + 32.0).round(1))
        end

        if event.get('dew_point')
          dp = event.get('dew_point').to_f
          event.set('dew_point_f', (dp * 9.0 / 5.0 + 32.0).round(1))
        end
      "
    }
  }
}
