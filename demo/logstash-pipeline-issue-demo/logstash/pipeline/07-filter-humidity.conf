filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        temp_f = event.get('temperature_f').to_f
        rh     = event.get('humidity').to_i

        # Heat index (Steadman, valid when temp_f >= 80 and rh >= 40)
        if temp_f >= 80 && rh >= 40
          hi = (-42.379 +
                 2.04901523  * temp_f +
                10.14333127  * rh -
                 0.22475541  * temp_f * rh -
                 0.00683783  * temp_f * temp_f -
                 0.05481717  * rh * rh +
                 0.00122874  * temp_f * temp_f * rh +
                 0.00085282  * temp_f * rh * rh -
                 0.00000199  * temp_f * temp_f * rh * rh)
          event.set('heat_index_f', hi.round(1))
        end

        # Comfort classification
        comfort = case rh
          when 0..29   then 'dry'
          when 30..59  then 'comfortable'
          when 60..79  then 'humid'
          else              'very_humid'
        end
        event.set('humidity_comfort', comfort)

        # Dew point depression (temp - dew_point): measures dryness
        dp = event.get('dew_point').to_f
        temp_c = event.get('temperature').to_f
        event.set('dew_point_depression', (temp_c - dp).round(1))
      "
    }
  }
}
