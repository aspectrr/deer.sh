filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        alerts = []
        temp_c   = event.get('temperature').to_f
        feels_c  = event.get('feels_like').to_f
        wspeed   = event.get('wind_speed').to_f
        wgusts   = event.get('wind_gusts').to_f
        precip   = event.get('precipitation').to_f
        vis_m    = event.get('visibility').to_i
        uv       = event.get('uv_index').to_f
        wcode    = event.get('weather_code').to_i

        alerts << 'extreme_heat'      if temp_c  > 38
        alerts << 'heat_advisory'     if temp_c  > 32 && temp_c <= 38
        alerts << 'extreme_cold'      if temp_c  < -20
        alerts << 'cold_advisory'     if temp_c  < -10 && temp_c >= -20
        alerts << 'wind_chill_danger' if feels_c < -25
        alerts << 'high_wind'         if wspeed  > 60
        alerts << 'gale_warning'      if wgusts  > 80
        alerts << 'heavy_rain'        if precip  > 10
        alerts << 'dense_fog'         if vis_m   < 200
        alerts << 'high_uv'           if uv      >= 8
        alerts << 'thunderstorm'      if [95,96,99].include?(wcode)
        alerts << 'blizzard'          if [73,75,86].include?(wcode) && wspeed > 50

        event.set('alerts',      alerts)
        event.set('alert_count', alerts.length)
        event.set('has_alert',   alerts.length > 0)
      "
    }
  }
}
