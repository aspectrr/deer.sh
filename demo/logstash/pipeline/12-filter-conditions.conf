filter {
  if "weather_parsed" in [tags] {
    ruby {
      code => "
        code = event.get('weather_code').to_i

        description = case code
          when 0          then 'Clear sky'
          when 1          then 'Mainly clear'
          when 2          then 'Partly cloudy'
          when 3          then 'Overcast'
          when 45         then 'Fog'
          when 48         then 'Depositing rime fog'
          when 51         then 'Light drizzle'
          when 53         then 'Moderate drizzle'
          when 55         then 'Dense drizzle'
          when 56         then 'Light freezing drizzle'
          when 57         then 'Heavy freezing drizzle'
          when 61         then 'Slight rain'
          when 63         then 'Moderate rain'
          when 65         then 'Heavy rain'
          when 66         then 'Light freezing rain'
          when 67         then 'Heavy freezing rain'
          when 71         then 'Slight snowfall'
          when 73         then 'Moderate snowfall'
          when 75         then 'Heavy snowfall'
          when 77         then 'Snow grains'
          when 80         then 'Slight rain showers'
          when 81         then 'Moderate rain showers'
          when 82         then 'Violent rain showers'
          when 85         then 'Slight snow showers'
          when 86         then 'Heavy snow showers'
          when 95         then 'Thunderstorm'
          when 96         then 'Thunderstorm with slight hail'
          when 99         then 'Thunderstorm with heavy hail'
          else                 'Unknown'
        end
        event.set('weather_description', description)

        # Weather category grouping
        category = case code
          when 0..3       then 'clear_cloudy'
          when 45..48     then 'fog'
          when 51..57     then 'drizzle'
          when 61..67     then 'rain'
          when 71..77     then 'snow'
          when 80..82     then 'showers'
          when 85..86     then 'snow_showers'
          when 95..99     then 'thunderstorm'
          else                 'unknown'
        end
        event.set('weather_category', category)

        precip_codes = [51,53,55,56,57,61,63,65,66,67,71,73,75,77,80,81,82,85,86,95,96,99]
        event.set('is_precipitation', precip_codes.include?(code))

        frozen_codes = [56,57,66,67,71,73,75,77,85,86]
        event.set('is_frozen_precipitation', frozen_codes.include?(code))
      "
    }
  }
}
