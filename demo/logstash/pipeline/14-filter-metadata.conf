filter {
  if "weather_parsed" in [tags] {
    # Enrich with station region
    if [location] == "new-york" or [location] == "chicago" or [location] == "indy" {
      mutate { add_field => { "region" => "east_central" } }
    } else if [location] == "sf" or [location] == "la" {
      mutate { add_field => { "region" => "west_coast" } }
    } else {
      mutate { add_field => { "region" => "other" } }
    }

    # Day/night label
    if [is_day] == 1 {
      mutate { add_field => { "day_night" => "day" } }
    } else {
      mutate { add_field => { "day_night" => "night" } }
    }

    mutate {
      add_field => {
        "pipeline_version" => "2.0.0"
        "data_source"      => "open-meteo"
        "unit_system"      => "metric_primary"
      }
      remove_field => ["message", "event", "@version"]
    }
  }
}
