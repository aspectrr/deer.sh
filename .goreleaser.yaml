# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: fluid
before:
  hooks:
    - sh -c "cd fluid-remote && go mod tidy"
    - sh -c "cd fluid-cli && go mod tidy"
builds:
  - id: fluid-remote
    dir: fluid-remote
    main: ./cmd/api/main.go
    binary: fluid-remote
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    tags:
      - libvirt
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
          - CGO_ENABLED=1
          - CGO_LDFLAGS=-L/usr/lib/aarch64-linux-gnu
          - PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
      - goos: linux
        goarch: amd64
        env:
          - CC=gcc
          - CXX=g++
          - CGO_ENABLED=1
  - id: fluid
    dir: fluid-cli
    main: ./cmd/fluid-cli
    binary: fluid
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    tags:
      - libvirt
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
          - CGO_ENABLED=1
          - CGO_LDFLAGS=-L/usr/lib/aarch64-linux-gnu
          - PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
      - goos: linux
        goarch: amd64
        env:
          - CC=gcc
          - CXX=g++
          - CGO_ENABLED=1
archives:
  - id: fluid-remote
    builds:
      - fluid-remote
    name_template: >-
      fluid-remote_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
  - id: fluid
    builds:
      - fluid
    name_template: >-
      fluid_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
checksum:
  name_template: checksums.txt
  algorithm: sha256
signs:
  - id: binary
    cmd: gpg
    artifacts: binary
    signature: "${artifact}.sig"
    args:
      - "--batch"
      - "--yes"
      - "--armor"
      - "--pinentry-mode=loopback"
      - "--passphrase={{ .Env.GPG_PASSPHRASE }}"
      - "--local-user={{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
  - id: checksum
    cmd: gpg
    artifacts: checksum
    signature: "${artifact}.sig"
    args:
      - "--batch"
      - "--yes"
      - "--armor"
      - "--pinentry-mode=loopback"
      - "--passphrase={{ .Env.GPG_PASSPHRASE }}"
      - "--local-user={{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
nfpms:
  - id: fluid-remote
    package_name: fluid-remote
    builds:
      - fluid-remote
    bindir: /usr/local/bin
    vendor: "Fluid.sh"
    homepage: "https://github.com/aspectrr/fluid.sh"
    maintainer: "Collin Pfeifer <cpfeifer@madcactus.org>"
    description: "Control-plane API for managing libvirt-based VM sandboxes"
    license: "MIT"
    formats:
      - deb
      - rpm
    dependencies:
      - openssh-client
      - postgresql-client
  - id: fluid
    package_name: fluid
    builds:
      - fluid
    bindir: /usr/local/bin
    vendor: "Fluid.sh"
    homepage: "https://github.com/aspectrr/fluid.sh"
    maintainer: "Collin Pfeifer <cpfeifer@madcactus.org>"
    description: "CLI for managing fluid sandboxes"
    license: "MIT"
    formats:
      - deb
      - rpm
release:
  github:
    owner: aspectrr
    name: fluid.sh
