# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: deer
before:
  hooks:
    - sh -c "VER=$(git describe --tags --abbrev=0 --match 'v*') && for d in api deer-daemon deer-cli; do (cd $d && GOWORK=off go get github.com/aspectrr/deer.sh/proto/gen/go@$VER && GOWORK=off go mod tidy) || exit 1; done"
builds:
  - id: api
    dir: api
    main: ./cmd/server
    binary: api
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
  - id: deer-daemon
    dir: deer-daemon
    main: ./cmd/deer-daemon
    binary: deer-daemon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
  - id: deer
    dir: deer-cli
    main: ./cmd/deer
    binary: deer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
archives:
  - id: api
    builds:
      - api
    name_template: >-
      api_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
  - id: deer-daemon
    builds:
      - deer-daemon
    name_template: >-
      deer-daemon_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
  - id: deer
    builds:
      - deer
    name_template: >-
      deer_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
checksum:
  name_template: checksums.txt
  algorithm: sha256
signs:
  - id: binary
    cmd: gpg
    artifacts: binary
    signature: "${artifact}.sig"
    args:
      - "--batch"
      - "--yes"
      - "--armor"
      - "--pinentry-mode=loopback"
      - "--passphrase={{ .Env.GPG_PASSPHRASE }}"
      - "--local-user={{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
  - id: checksum
    cmd: gpg
    artifacts: checksum
    signature: "${artifact}.sig"
    args:
      - "--batch"
      - "--yes"
      - "--armor"
      - "--pinentry-mode=loopback"
      - "--passphrase={{ .Env.GPG_PASSPHRASE }}"
      - "--local-user={{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
nfpms:
  - id: api
    package_name: api
    builds:
      - api
    bindir: /usr/local/bin
    vendor: "Deer.sh"
    homepage: "https://github.com/aspectrr/deer.sh"
    maintainer: "Collin Pfeifer <cpfeifer@madcactus.org>"
    description: "Control-plane API for deer.sh sandbox management"
    license: "MIT"
    formats:
      - deb
      - rpm
    dependencies:
      - openssh-client
      - postgresql-client
  - id: deer-daemon
    package_name: deer-daemon
    builds:
      - deer-daemon
    bindir: /usr/local/bin
    vendor: "Deer.sh"
    homepage: "https://deer.sh"
    maintainer: "Collin Pfeifer <cpfeifer@madcactus.org>"
    description: "Background daemon for managing VM sandboxes on a host"
    license: "MIT"
    formats:
      - deb
      - rpm
    dependencies:
      - openssh-client
    contents:
      - src: deer-daemon/packaging/deer-daemon.service
        dst: /etc/systemd/system/deer-daemon.service
      - src: deer-daemon/packaging/daemon.yaml
        dst: /etc/deer-daemon/daemon.yaml
        type: config|noreplace
    scripts:
      postinstall: deer-daemon/packaging/postinstall.sh
      preremove: deer-daemon/packaging/preremove.sh
    overrides:
      deb:
        recommends:
          - qemu-system-x86
          - qemu-utils
          - libvirt-daemon-system
          - libvirt-clients
          - libguestfs-tools
          - iproute2
          - bridge-utils
      rpm:
        recommends:
          - qemu-kvm
          - qemu-img
          - libvirt
          - libvirt-client
          - libguestfs-tools-c
          - iproute
          - bridge-utils
  - id: deer
    package_name: deer
    builds:
      - deer
    bindir: /usr/local/bin
    vendor: "Deer.sh"
    homepage: "https://github.com/aspectrr/deer.sh"
    maintainer: "Collin Pfeifer <cpfeifer@madcactus.org>"
    description: "CLI for managing deer sandboxes"
    license: "MIT"
    formats:
      - deb
      - rpm
release:
  github:
    owner: aspectrr
    name: deer.sh
